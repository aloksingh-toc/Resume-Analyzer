# =============================================
# App Authentication (single user)
# =============================================
app.username=${APP_USERNAME:admin}
app.password=${APP_PASSWORD}
app.cors.allowed-origins=${APP_CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

# =============================================
# Database URL override (for Docker / prod)
# =============================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:oracle:thin:@localhost:1522/freepdb1}

# =============================================
# Logging
# =============================================
logging.level.com.resumeanalyzer=DEBUG
logging.level.org.springframework.web=INFO
